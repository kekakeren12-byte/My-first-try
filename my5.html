<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .container {
            padding: 60px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            margin: auto;
            box-shadow: 0 0 15px black;
        }

        h1 {
            color: #38bdf8;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">
            <h1 id="name">Your Name</h1>
            <p>💻 Future Web Developer</p>
            <p>🇨🇲 From Cameroon</p>

            <h3>Skills:</h3>
            <p>HTML • CSS • JavaScript (learning)</p>

            <button onclick="changeText()">Hire Me</button>
        </div>

    </div>

    <script>
        function changeText() {
            document.getElementById("name").innerHTML = "I am a Future Software Engineer 🚀";
        }
    </script>

</body>
</html>
